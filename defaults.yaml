# git-mcp-server — defaults.yaml
# All values configurable via cloud_dog_config precedence:
# os.environ -> .env -> config.yaml -> defaults.yaml

api_server:
  host: "0.0.0.0"
  port: 8078
  client_host: ""
  request_timeout_seconds: 30.0
  base_path: "/api/v1"  # PS-92 canonical API base path; legacy /app/v1 preserved as hardcoded compat (include_in_schema=False; NOT configurable per W28A-970c-V2).

web_server:
  host: "0.0.0.0"
  port: 8079

mcp_server:
  host: "0.0.0.0"
  port: 8084
  transport: "streamable-http"
  base_path: "/git-mcp"  # PS-92 canonical MCP proxy base path.

a2a_server:
  host: "0.0.0.0"
  port: 8085
  base_path: "/a2a"  # PS-92 canonical A2A base path.

runtime:
  mode: "local-server"       # local-server | local-docker | remote-runtime
  seed_key_file: "${GIT_MCP_SEED_KEY_FILE || ''}"
  a2a_test_api_key: ""
  server_id: "${HOSTNAME:git-mcp-local}"

git:
  api_key: ""

jobs:
  backend: "sql"
  queue_name: "git-mcp"
  run_timeout_seconds: 300.0
  payload_max_bytes: 16384
  claim_timeout_seconds: 120
  max_retries: 3
  dead_letter_queue: "git_mcp_dead_letter"

web:
  ui_dist_dir: "./ui/dist"
  default_profile: "remote_cloud_dog"
  environment: "${CLOUD_DOG_ENVIRONMENT:dev}"
  session_timeout_minutes: "${CLOUD_DOG_SESSION_TIMEOUT_MINUTES:30}"

web_login:
  # Thread-a flat WebUI login: three flat roles admin / read-write / read-only.
  # admin password is operator-supplied via env (CLOUD_DOG_WEB_LOGIN_PASSWORD), set in
  # read-write / read-only default to EMPTY here so web_server.py seeds the
  # estate-canonical in-code demo defaults (BlueRiverChair / GreenRiverDesk) — matching
  # accepted chat-client (W28A-727-R5) + notification-agent (W28A-730-R5). They are still
  # overridable via the standard CLOUD_DOG__WEB_LOGIN__READ_WRITE_PASSWORD / __READ_ONLY_PASSWORD
  # env overlay. (W28A-731-R5: the prior `${VAR:''}` default resolved to a literal `''`, which
  # is non-empty and therefore defeated the in-code fallback, so read-write/read-only could not log in.)
  username: "${CLOUD_DOG_WEB_LOGIN_USERNAME:admin}"
  password: "${CLOUD_DOG_WEB_LOGIN_PASSWORD:''}"
  read_write_username: "${CLOUD_DOG_WEB_LOGIN_READ_WRITE_USERNAME:read-write}"
  read_write_password: ""
  read_only_username: "${CLOUD_DOG_WEB_LOGIN_READ_ONLY_USERNAME:read-only}"
  read_only_password: ""

auth:
  mode: "api_key"            # api_key | jwt | api_key+jwt
  jwt:
    issuer: ""
    audience: ""
    public_keys_url: ""
    secret: ""
  enterprise:
    provider: "keycloak"     # keycloak | ldap | saml
    keycloak_base_url: ""
    keycloak_realm: ""
    keycloak_client_id: ""
    keycloak_client_secret: ""

storage:
  db:
    url: "sqlite:///data/git_mcp.db"
  audit:
    path: "./data/audit/audit.jsonl"
  events:
    path: "./data/events/a2a_config.jsonl"
  https_credentials:
    url: ""
    token: ""

workspace:
  base_dir: "./data/workspaces"
  default_mode: "ephemeral"  # ephemeral | persistent
  default_ttl_seconds: 3600
  cleanup_interval_seconds: 300
  remote_clone_depth: "${GIT_MCP_REMOTE_CLONE_DEPTH:''}"

profiles:
  local_test:
    repo:
      source: "https://github.com/octocat/Hello-World.git"
      default_branch: "main"
      remotes:
        origin: "https://github.com/octocat/Hello-World.git"
    workspace:
      mode: "ephemeral"
      ttl_seconds: 3600
    policy:
      protected_branches: ["main", "release/*"]
      ff_only_targets: ["main"]
      force_push: "admin_only"
      file_scope:
        deny_globs: ["**/.git/**"]
        allowed_types: ["*"]
      validation:
        json: "strict"
        yaml: "warn"
        xml: "warn"
        html: "ignore"
        markdown: "ignore"
    auth:
      credential_mode: "session"
    recovery:
      mode: "stash"

  remote_cloud_dog:
    repo:
      source: "https://github.com/octocat/Hello-World.git"
      default_branch: "main"
      remotes:
        origin: "https://github.com/octocat/Hello-World.git"
    workspace:
      mode: "ephemeral"
      ttl_seconds: 900
    policy:
      protected_branches: ["main"]
      ff_only_targets: ["main"]
      force_push: "never"
      file_scope:
        deny_globs: ["**/.git/**"]
        allowed_types: ["*"]
      validation:
        json: "strict"
        yaml: "warn"
        xml: "warn"
        html: "ignore"
        markdown: "ignore"
    auth:
      credential_mode: "session"
    recovery:
      mode: "stash"

  # GM-PR-06: seed-profile breadth — distinct source types, default branches, credential modes,
  # workspace modes, force-push policies, and recovery modes so the Profiles WebUI shows real variety.
  local_path_repo:
    repo:
      source: "file:///workspace/git-mcp/seed/local-repo"
      default_branch: "main"
      remotes:
        origin: "file:///workspace/git-mcp/seed/local-repo"
    workspace:
      mode: "ephemeral"
      ttl_seconds: 1800
    policy:
      protected_branches: ["main"]
      ff_only_targets: ["main"]
      force_push: "admin_only"
      file_scope:
        deny_globs: ["**/.git/**"]
        allowed_types: ["*"]
      validation:
        json: "strict"
        yaml: "warn"
        xml: "warn"
        html: "ignore"
        markdown: "ignore"
    auth:
      credential_mode: "session"
    recovery:
      mode: "recovery_branch"

  stored_https_repo:
    repo:
      source: "https://git.example.com/platform/service.git"
      default_branch: "develop"
      remotes:
        origin: "https://git.example.com/platform/service.git"
    workspace:
      mode: "persistent"
      ttl_seconds: 7200
    policy:
      protected_branches: ["develop", "release/*"]
      ff_only_targets: ["develop"]
      force_push: "never"
      file_scope:
        deny_globs: ["**/.git/**"]
        allowed_types: ["*"]
      validation:
        json: "strict"
        yaml: "warn"
        xml: "warn"
        html: "ignore"
        markdown: "ignore"
    auth:
      credential_mode: "stored"
    recovery:
      mode: "stash"

  mirror_master_repo:
    repo:
      source: "https://github.com/octocat/Spoon-Knife.git"
      default_branch: "master"
      remotes:
        origin: "https://github.com/octocat/Spoon-Knife.git"
    workspace:
      mode: "ephemeral"
      ttl_seconds: 900
    policy:
      protected_branches: ["master"]
      ff_only_targets: ["master"]
      force_push: "never"
      file_scope:
        deny_globs: ["**/.git/**"]
        allowed_types: ["*"]
      validation:
        json: "strict"
        yaml: "warn"
        xml: "warn"
        html: "ignore"
        markdown: "ignore"
    auth:
      credential_mode: "session"
    recovery:
      mode: "patch_bundle"

rbac:
  enabled: true
  default_deny: true
  roles:
    admin: ["*"]
    maintainer: ["repo_*", "git_*", "file_*", "dir_*", "admin_profile_read", "admin_rbac_read"]
    writer: ["repo_*", "git_*", "file_*", "dir_*"]
    reader: ["repo_open", "repo_close", "git_status", "git_log", "git_diff", "git_branch_list", "git_tag_list", "file_read", "file_download", "dir_list", "search_*", "git_watch_list", "git_watch_status", "git_watch_get_batch", "git_watch_ack", "git_watch_recover"]

log:
  level: "INFO"
  format: "json"
  log_folder: "./logs"
  service_instance: "${HOSTNAME:git-mcp-local}"
  environment: "${CLOUD_DOG_ENVIRONMENT:dev}"
  api_server_log: "./logs/api_server.log"
  web_server_log: "./logs/web_server.log"
  mcp_server_log: "./logs/mcp_server.log"
  a2a_server_log: "./logs/a2a_server.log"
  audit_log: "logs/audit.log.jsonl"
  retention:
    hot_days: 14
    cold_days: 60
    archive_format: "gz"
  integrity:
    enabled: true
    interval_seconds: 300
    log_file: "logs/audit-integrity.log"
    hash_algorithm: "sha256"
  rotation:
    mode: "size"
    max_bytes: 104857600
    backup_count: 10
    when: "midnight"
    interval: 1
    compress: true
